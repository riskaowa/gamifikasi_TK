<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='gamification.css') }}">
    <title>Register - Gamifikasi PAUD</title>
</head>

<body class="gamified-body">
    <div class="gamified-container" style="max-width: 560px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <a href="{{ url_for('main.index') }}" style="color: #19396b; text-decoration: none; font-weight: bold;">← Kembali Ke Halaman Utama</a>
            <span style="font-size: 0.85rem; color: #19396b; font-weight: 700;">GAMIFIKASI PAUD</span>
        </div>

        <div style="display: flex; gap: 8px; margin-bottom: 18px;">
            <a href="{{ url_for('main.login') }}" style="flex: 1; padding: 11px 0; border: 2px solid #19396b; text-align: center; font-weight: 700; color: #19396b; text-decoration: none; border-radius: 12px; background: #e7f0ff;">Masuk</a>
            <a href="{{ url_for('main.register') }}" style="flex: 1; padding: 11px 0; border: 2px solid #19396b; text-align: center; font-weight: 700; color: #19396b; text-decoration: none; border-radius: 12px; background: #ffffff;">Bergabung</a>
        </div>

        <h1 class="gamified-title" style="margin-bottom: 20px;">Buat Akun</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('main.register') }}" method="post" class="gamified-form">
            <div>
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <div>
                <label for="role">Role</label>
                <select id="role" name="role" required>
                    <option value="">Pilih</option>
                    <option value="murid">Murid</option>
                    <option value="guru">Guru</option>
                    <option value="orangtua">Orang Tua</option>
                </select>
            </div>
            <div>
                <label for="kelas">Pilih Kelas</label>
                <select id="kelas" name="kelas" required>
                    <option value="">Pilih Kelas</option>
                    <option value="A">Kelas A</option>
                    <option value="B">Kelas B</option>
                    <option value="C">Kelas C</option>
                </select>
            </div>
            <button type="submit" class="gamified-btn">Bergabung</button>
        </form>

        <div class="gamified-link" style="margin-top: 16px;">
            <p>Sudah Punya Akun? <a href="{{ url_for('main.login') }}">Masuk</a></p>
        </div>
    </div>
</body>

</html>
